<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Real-time tide chart for New Brighton Beach, Christchurch, New Zealand." />
  <title>New Brighton Tide Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <main id="app">
    <header>
      <h1>Tide Chart</h1>
      <p class="subtitle">New Brighton · Christchurch, NZ</p>
    </header>

    <div id="next-tide-banner" class="banner">
      <span class="banner-eyebrow">Next tide</span>
      <span id="next-tide-text">Loading…</span>
    </div>

    <div id="date-picker-row">
      <label for="date-picker">Date</label>
      <input type="date" id="date-picker" />
      <button id="today-btn" class="hidden" aria-label="Go to today">Today</button>
    </div>

    <div id="sun-times" class="sun-row">
      <div class="sun-item">
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 18a5 5 0 0 0-10 0"/>
          <line x1="12" y1="2" x2="12" y2="9"/>
          <line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/>
          <line x1="1" y1="18" x2="3" y2="18"/>
          <line x1="21" y1="18" x2="23" y2="18"/>
          <line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/>
          <line x1="23" y1="22" x2="1" y2="22"/>
          <polyline points="8 6 12 2 16 6"/>
        </svg>
        <div class="sun-info">
          <span class="sun-label">Sunrise</span>
          <span id="sunrise-text" class="sun-time">—</span>
        </div>
      </div>
      <div class="sun-divider"></div>
      <div class="sun-item">
        <svg class="sun-icon sun-icon--set" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 18a5 5 0 0 0-10 0"/>
          <line x1="12" y1="9" x2="12" y2="2"/>
          <line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/>
          <line x1="1" y1="18" x2="3" y2="18"/>
          <line x1="21" y1="18" x2="23" y2="18"/>
          <line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/>
          <line x1="23" y1="22" x2="1" y2="22"/>
          <polyline points="16 5 12 9 8 5"/>
        </svg>
        <div class="sun-info">
          <span class="sun-label">Sunset</span>
          <span id="sunset-text" class="sun-time">—</span>
        </div>
      </div>
    </div>

    <div id="wind-row" class="wind-row">
      <div class="wind-item">
        <svg id="wind-arrow-icon" class="wind-arrow" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
        <div class="sun-info">
          <span class="sun-label">Wind</span>
          <span id="wind-speed-text" class="sun-time">—</span>
        </div>
      </div>
      <div class="sun-divider"></div>
      <div class="wind-item">
        <div class="sun-info">
          <span class="sun-label">Gusts</span>
          <span id="wind-gust-text" class="sun-time">—</span>
        </div>
      </div>
      <div class="sun-divider"></div>
      <div class="wind-item">
        <div class="sun-info">
          <span class="sun-label">Direction</span>
          <span id="wind-dir-text" class="sun-time">—</span>
        </div>
      </div>
    </div>
    <p id="wind-disclaimer" class="wind-disclaimer hidden"></p>

    <div id="chart-container">
      <canvas id="tide-chart"></canvas>
    </div>

    <div id="error-message" class="hidden">
      Connection failed. Please refresh the page.
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
